# ── Test Datasource (H2 in-memory — clean default) ───────────────────────────
# MODE=PostgreSQL makes H2 behave like PostgreSQL for Flyway migrations
# and basic SQL compatibility. This is required for consistent test behavior.
spring.datasource.url=jdbc:h2:mem:sentinelx_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- HikariCP Connection Pool Tuning ---
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.pool-name=SentinelX-Test-Pool

spring.jpa.hibernate.ddl-auto=validate

# ── Dashboard JDBC Aggregations ───────────────────────────────────────────────
# Keep false in H2-backed test profile to avoid PostgreSQL-specific SQL paths.
dashboard.useJdbcAggregations=false

# ── Read-Only DB Retry (test) ─────────────────────────────────────────────────
db.retry.read.maxAttempts=1
db.retry.read.initialIntervalMs=100
db.retry.read.multiplier=1.0
db.retry.read.maxIntervalMs=100

# ── Transaction Management (test) ─────────────────────────────────────────────
db.transaction.defaultTimeoutSeconds=10
