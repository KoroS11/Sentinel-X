spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP Connection Pool Tuning ---
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.pool-name=SentinelX-Test-Pool

# --- JDBC Timeout ---
spring.datasource.hikari.data-source-properties.socketTimeout=15
spring.datasource.hikari.data-source-properties.loginTimeout=3

# --- SSL (disabled for tests) ---
spring.datasource.hikari.data-source-properties.ssl=false

spring.jpa.hibernate.ddl-auto=validate
