spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP Connection Pool Tuning ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.pool-name=SentinelX-Prod-Pool

# --- JDBC Timeout ---
spring.datasource.hikari.data-source-properties.socketTimeout=60
spring.datasource.hikari.data-source-properties.loginTimeout=10

# --- SSL (enabled for production) ---
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

spring.jpa.hibernate.ddl-auto=validate

# ── Dashboard JDBC Aggregations ───────────────────────────────────────────────
dashboard.useJdbcAggregations=true

# ── Read-Only DB Retry (prod) ─────────────────────────────────────────────────
db.retry.read.maxAttempts=3
db.retry.read.initialIntervalMs=500
db.retry.read.multiplier=2.0
db.retry.read.maxIntervalMs=5000
