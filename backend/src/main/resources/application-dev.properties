spring.config.import=optional:file:./secrets.local.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HikariCP Connection Pool Tuning ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.pool-name=SentinelX-Dev-Pool

# --- JDBC Timeout ---
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.datasource.hikari.data-source-properties.loginTimeout=5

# --- SSL (disabled for local dev) ---
spring.datasource.hikari.data-source-properties.ssl=false

spring.jpa.hibernate.ddl-auto=validate

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# ── Dashboard JDBC Aggregations ───────────────────────────────────────────────
dashboard.useJdbcAggregations=true

# ── Read-Only DB Retry (dev) ──────────────────────────────────────────────────
db.retry.read.maxAttempts=2
db.retry.read.initialIntervalMs=300
db.retry.read.multiplier=2.0
db.retry.read.maxIntervalMs=3000

# ── Transaction Management (dev) ──────────────────────────────────────────────
db.transaction.defaultTimeoutSeconds=60
